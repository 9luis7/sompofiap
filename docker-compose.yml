version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./ml_models:/app/ml_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sompo-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sompo-network

  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: sompo_ia
      POSTGRES_USER: sompo_user
      POSTGRES_PASSWORD: sompo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sompo-network

networks:
  sompo-network:
    driver: bridge

volumes:
  postgres_data:
